<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekaitz Arévalo</title>
<meta name="description" content="Enlaces de Ekaitz Arévalo — Marketing, tecnología y Forjando mi vida.">

<!-- ============================================================
     COLORES DE MARCA (los puedes tocar aquí mismo):
     Fondo oscuro:  #1A1A1A
     Crema:         #F5F0E8
     Dorado:        #C9A84C
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:        #1A1A1A;
    --bg-soft:   #232323;
    --cream:     #F5F0E8;
    --cream-dim: #b8b2a8;
    --gold:      #C9A84C;
    --gold-soft: rgba(201,168,76,.14);
    --card:      rgba(245,240,232,.04);
    --card-bd:   rgba(245,240,232,.10);
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{ height:100%; }

  body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--cream);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    padding:clamp(20px,5vh,48px) 22px;
  }

  /* ---- Fondo: brillo dorado + textura de persiana (guiño a la marca) ---- */
  body::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(110% 70% at 50% -10%, rgba(201,168,76,.16), transparent 60%),
      radial-gradient(80% 60% at 50% 120%, rgba(201,168,76,.06), transparent 55%);
    pointer-events:none;
  }
  body::after{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 5px,
      rgba(0,0,0,.18) 5px,
      rgba(0,0,0,.18) 6px
    );
    opacity:.35;
    pointer-events:none;
    mix-blend-mode:multiply;
  }

  .wrap{
    position:relative;
    z-index:2;
    width:100%;
    max-width:430px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  /* ---------- CABECERA / FOTO ---------- */
  .avatar{
    position:relative;
    width:clamp(96px,26vw,118px);
    height:clamp(96px,26vw,118px);
    border-radius:50%;
    padding:3px;
    background:linear-gradient(145deg,var(--gold),rgba(201,168,76,.25));
    box-shadow:0 0 0 1px rgba(201,168,76,.25), 0 18px 45px rgba(0,0,0,.55);
    opacity:0; transform:translateY(14px);
    animation:rise .7s .05s ease forwards;
  }
  .avatar img,
  .avatar .placeholder{
    width:100%; height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
    background:var(--bg-soft);
  }
  /* Iniciales mientras no haya foto */
  .avatar .placeholder{
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif;
    font-size:2.2rem; color:var(--gold);
    letter-spacing:1px;
  }

  .name{
    font-family:'Playfair Display',serif;
    font-weight:600;
    font-size:clamp(1.75rem,7vw,2.2rem);
    letter-spacing:.5px;
    margin-top:18px;
    opacity:0; transform:translateY(14px);
    animation:rise .7s .15s ease forwards;
  }
  .name b{ color:var(--gold); font-weight:600; }

  .tagline{
    font-size:.78rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--cream-dim);
    margin-top:8px;
    display:flex; align-items:center; gap:10px;
    opacity:0; transform:translateY(14px);
    animation:rise .7s .25s ease forwards;
  }
  .tagline::before, .tagline::after{
    content:""; height:1px; width:26px;
    background:linear-gradient(90deg,transparent,var(--gold));
  }
  .tagline::after{ transform:scaleX(-1); }

  /* ---------- BOTONES ---------- */
  .links{
    width:100%;
    margin-top:clamp(22px,4.5vh,34px);
    display:flex;
    flex-direction:column;
    gap:13px;
  }

  .link{
    --d:0ms;
    position:relative;
    display:flex;
    align-items:center;
    gap:15px;
    width:100%;
    padding:15px 18px;
    border-radius:15px;
    background:var(--card);
    border:1px solid var(--card-bd);
    color:var(--cream);
    text-decoration:none;
    backdrop-filter:blur(6px);
    overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
    opacity:0; transform:translateY(16px);
    animation:rise .6s ease forwards;
    animation-delay:var(--d);
  }
  /* Línea dorada vertical que aparece al hover (guiño "Forjando mi vida") */
  .link::before{
    content:"";
    position:absolute; left:0; top:50%;
    height:0; width:3px;
    background:var(--gold);
    transform:translateY(-50%);
    transition:height .28s ease;
  }
  .link:hover, .link:focus-visible{
    transform:translateY(-3px);
    border-color:rgba(201,168,76,.55);
    background:rgba(245,240,232,.07);
    outline:none;
  }
  .link:hover::before, .link:focus-visible::before{ height:100%; }

  .icon{
    flex:0 0 auto;
    width:42px; height:42px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    background:var(--gold-soft);
    color:var(--gold);
    transition:background .25s ease, color .25s ease;
  }
  .link:hover .icon{ background:var(--gold); color:var(--bg); }
  .icon svg{ width:21px; height:21px; }

  .txt{ flex:1; text-align:left; line-height:1.25; }
  .txt .t{ font-weight:600; font-size:.97rem; }
  .txt .s{ font-size:.76rem; color:var(--cream-dim); }

  .arrow{
    flex:0 0 auto;
    color:var(--cream-dim);
    transition:transform .25s ease, color .25s ease;
  }
  .link:hover .arrow{ transform:translateX(4px); color:var(--gold); }
  .arrow svg{ width:18px; height:18px; }

  .foot{
    margin-top:clamp(20px,4vh,30px);
    font-size:.72rem;
    letter-spacing:.05em;
    color:rgba(184,178,168,.55);
    opacity:0;
    animation:rise .7s .8s ease forwards;
  }
  .foot b{ color:var(--gold); font-weight:500; }

  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; }
    .avatar,.name,.tagline,.link,.foot{ opacity:1; transform:none; }
  }
</style>
</head>
