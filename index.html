<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekaitz Arévalo</title>
<meta name="description" content="Enlaces de Ekaitz Arévalo.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#1A1A1A; --bg-soft:#232323;
    --cream:#F5F0E8; --cream-dim:#b8b2a8;
    --gold:#C9A84C; --gold-soft:rgba(201,168,76,.14);
    --card:rgba(245,240,232,.04); --card-bd:rgba(245,240,232,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);
    min-height:100dvh;display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;padding:clamp(18px,4vh,40px) 22px;
  }
  body::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(110% 60% at 50% -10%, rgba(201,168,76,.14), transparent 60%),
      radial-gradient(80% 60% at 50% 120%, rgba(201,168,76,.05), transparent 55%);
  }

  .wrap{position:relative;z-index:2;width:100%;max-width:430px;
    display:flex;flex-direction:column;align-items:center;}

  /* ---------- HEADER / FOTO ---------- */
  .hero{
    position:relative;width:100%;
    height:clamp(210px,36vh,290px);
    border-radius:20px;overflow:hidden;
    box-shadow:0 0 0 1px rgba(201,168,76,.22), 0 20px 50px rgba(0,0,0,.55);
    opacity:0;transform:translateY(14px);animation:rise .7s .05s ease forwards;
  }
  .hero img{
    width:100%;height:100%;object-fit:cover;object-position:center 18%;display:block;
  }
  .hero::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(to bottom, rgba(26,26,26,0) 35%, rgba(26,26,26,.55) 72%, rgba(26,26,26,.96) 100%);
  }
  .hero .name{
    position:absolute;left:0;right:0;bottom:16px;z-index:2;
    font-family:'Playfair Display',serif;font-weight:600;
    font-size:clamp(1.8rem,7.5vw,2.3rem);letter-spacing:.5px;text-align:center;
    text-shadow:0 2px 18px rgba(0,0,0,.6);
  }
  .hero .name b{color:var(--gold);font-weight:600;}

  /* ---------- BOTONES ---------- */
  .links{width:100%;margin-top:clamp(18px,3.5vh,26px);
    display:flex;flex-direction:column;gap:12px;}
  .link{
    --d:0ms;position:relative;display:flex;align-items:center;gap:15px;width:100%;
    padding:14px 18px;border-radius:14px;background:var(--card);
    border:1px solid var(--card-bd);color:var(--cream);text-decoration:none;
    backdrop-filter:blur(6px);overflow:hidden;
    transition:transform .25s ease,border-color .25s ease,background .25s ease;
    opacity:0;transform:translateY(16px);animation:rise .6s ease forwards;animation-delay:var(--d);
  }
  .link::before{content:"";position:absolute;left:0;top:50%;height:0;width:3px;
    background:var(--gold);transform:translateY(-50%);transition:height .28s ease;}
  .link:hover,.link:focus-visible{transform:translateY(-3px);
    border-color:rgba(201,168,76,.55);background:rgba(245,240,232,.07);outline:none;}
  .link:hover::before,.link:focus-visible::before{height:100%;}
  .icon{flex:0 0 auto;width:42px;height:42px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    background:var(--gold-soft);color:var(--gold);
    transition:background .25s ease,color .25s ease;}
  .link:hover .icon{background:var(--gold);color:var(--bg);}
  .icon svg{width:21px;height:21px;}
  .label{flex:1;text-align:left;font-weight:600;font-size:.98rem;letter-spacing:.01em;}
  .arrow{flex:0 0 auto;color:var(--cream-dim);transition:transform .25s ease,color .25s ease;}
  .link:hover .arrow{transform:translateX(4px);color:var(--gold);}
  .arrow svg{width:18px;height:18px;}

  /* ---------- WHATSAPP (pequeño) ---------- */
  .wa{display:inline-flex;align-items:center;gap:9px;
    margin-top:clamp(14px,2.5vh,20px);padding:9px 18px;border-radius:999px;
    background:rgba(37,211,102,.10);border:1px solid rgba(37,211,102,.35);
    color:var(--cream);text-decoration:none;font-size:.85rem;font-weight:600;letter-spacing:.02em;
    transition:transform .25s ease,background .25s ease,border-color .25s ease;
    opacity:0;animation:rise .6s .7s ease forwards;}
  .wa:hover,.wa:focus-visible{transform:translateY(-2px);
    background:rgba(37,211,102,.18);border-color:rgba(37,211,102,.65);outline:none;}
  .wa svg{width:18px;height:18px;color:#25D366;}

  .foot{margin-top:clamp(14px,2.5vh,22px);font-size:.72rem;letter-spacing:.05em;
    color:rgba(184,178,168,.55);opacity:0;animation:rise .7s .8s ease forwards;}
  .foot b{color:var(--gold);font-weight:500;}

  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;}
    .hero,.link,.foot{opacity:1;transform:none;}
  }
</style>
</head>

    position:relative;
    display:flex;
    align-items:center;
    gap:15px;
    width:100%;
    padding:15px 18px;
    border-radius:15px;
    background:var(--card);
    border:1px solid var(--card-bd);
    color:var(--cream);
    text-decoration:none;
    backdrop-filter:blur(6px);
    overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
    opacity:0; transform:translateY(16px);
    animation:rise .6s ease forwards;
    animation-delay:var(--d);
  }
  /* Línea dorada vertical que aparece al hover (guiño "Forjando mi vida") */
  .link::before{
    content:"";
    position:absolute; left:0; top:50%;
    height:0; width:3px;
    background:var(--gold);
    transform:translateY(-50%);
    transition:height .28s ease;
  }
  .link:hover, .link:focus-visible{
    transform:translateY(-3px);
    border-color:rgba(201,168,76,.55);
    background:rgba(245,240,232,.07);
    outline:none;
  }
  .link:hover::before, .link:focus-visible::before{ height:100%; }

  .icon{
    flex:0 0 auto;
    width:42px; height:42px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    background:var(--gold-soft);
    color:var(--gold);
    transition:background .25s ease, color .25s ease;
  }
  .link:hover .icon{ background:var(--gold); color:var(--bg); }
  .icon svg{ width:21px; height:21px; }

  .txt{ flex:1; text-align:left; line-height:1.25; }
  .txt .t{ font-weight:600; font-size:.97rem; }
  .txt .s{ font-size:.76rem; color:var(--cream-dim); }

  .arrow{
    flex:0 0 auto;
    color:var(--cream-dim);
    transition:transform .25s ease, color .25s ease;
  }
  .link:hover .arrow{ transform:translateX(4px); color:var(--gold); }
  .arrow svg{ width:18px; height:18px; }

  .foot{
    margin-top:clamp(20px,4vh,30px);
    font-size:.72rem;
    letter-spacing:.05em;
    color:rgba(184,178,168,.55);
    opacity:0;
    animation:rise .7s .8s ease forwards;
  }
  .foot b{ color:var(--gold); font-weight:500; }

  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; }
    .avatar,.name,.tagline,.link,.foot{ opacity:1; transform:none; }
  }
</style>
</head>
